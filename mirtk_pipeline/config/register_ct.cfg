[ transformation model ]
Transformation model  = FFD
Control point spacing = 10

[ objective function ]
Energy function = NMI(I(1), I(2:end) o T) + 0.001 BE[Bending energy](T) + 0.0005 LE(T)
No. of bins = 64

[ optimization ]
No. of levels                    = 2
Strict step length range         = No
Maximum streak of rejected steps = 1
Maximum no. of iterations        = 100

[ level 1 ]
Resolution in X = 4
Resolution in Y = 4
Resolution in Z = 4

[ level 2 ]
Resolution in X = 8
Resolution in Y = 8
Resolution in Z = 8
